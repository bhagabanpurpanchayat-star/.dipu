            padding: 0;

            border-radius: 40px;

        }
        .col {
            padding: 1rem 0.9rem;
            max-height: 400px;

        }

        .col-middle {

        }
        .col-right {

        }
        .col-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #08355c;
            margin-bottom: 0.7rem;
        }
        .col-title span {
            background: #1b5385;
            color: white;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.6rem;
        }

        .field-sm {
            margin-bottom: 0.6rem;
        }
        .field-sm label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #123f67;

        }
        .field-sm input, .field-sm select {

            border-radius: 30px;
            font-size: 0.65rem;

        }
        .inline-duo {

        }

        .checkbox-scroll {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #8daacd;
            border-radius: 16px;
            padding: 5px 6px;
            background: #f6faff;
            margin-bottom: 6px;
        }
        .member-row {
            display: flex;
            align-items: center;

        }
        .member-row input {

            height: 14px;
            accent-color: #1b5589;
        }
        .selected-list {
            background: #dde9f7;

        }
        .selected-list .mini-title {

            margin: 5px 0;
        }

            white-space: pre-line;
        }
        .center { text-align: center; }

<body>

        </div>

    <!-- বাটন গ্রুপ -->
    <div class="button-row" id="defaultButtons">
        <button class="gen-btn" id="generateBtn">🖨️ জেনারেট</button>
        <button class="save-btn" id="saveSheetBtn">💾 সেভ</button>
        <button class="view-btn" id="viewPrevBtn">📋 পূর্ববর্তী সভা দেখুন</button>
        <button class="pdf-btn" id="exportPdfBtn">📕 PDF</button>
        <button class="doc-btn" id="exportDocBtn">📄 DOC</button>

    <!-- এডিট মোড বাটন -->

    <!-- পূর্ববর্তী সভা টেবিল -->

        <div class="prev-header">
            <h3>📋 পূর্ববর্তী সভার তালিকা</h3>
            <button class="close-prev-btn" id="closePrevBtn">বন্ধ করুন</button>

                        <th>SL NO</th>

                        <th>MEETING TIME</th>
                        <th>LETTER ISSUE DATE</th>
                        <th>MEETING TYPE</th>

</div>

<script>
    (function() {
        // ---------- সম্পূর্ণ সদস্য ডেটাবেস (শুধু লেটারে ব্যবহার হবে) ----------

            { name: "BENEJI KHATUN", gender: "Female", mobile: "9593711972", designation: "MEMBER", sansad: "Bhagabanpur/XIV-14", village: "HARIPUR" },
            { name: "MD ATAUR RAHMAN", gender: "Male", mobile: "9733042218", designation: "MEMBER", sansad: "Bhagabanpur/XV-15", village: "HARIPUR" },

            { name: "AFAJUDDIN AHAMMED", gender: "Male", mobile: "8145850297", designation: "MEMBER", sansad: "Bhagabanpur-XVII", village: "KHADIYARPUR" },
            { name: "ZED REHAMAN", gender: "Male", mobile: "8327437767", designation: "VICE CHAIRMAN", sansad: "Bhagabanpur-XVIII", village: "ARBARA" },
            { name: "MOUSUMI KHATUN", gender: "Female", mobile: "7076775066", designation: "MEMBER", sansad: "Bhagabanpur-XIX", village: "ARBARA" },
            { name: "SYED NEAMUL HOQUE", gender: "Male", mobile: "9733951496", designation: "Shilpa O Parikathamho", sansad: "Bhagabanpur-XX", village: "KHASALPUR" },
            { name: "MUNNI KHATUN", gender: "Female", mobile: "6297707133", designation: "PS Member", sansad: "Bhagabanpur-1", village: "BELPUKUR" },
            { name: "SAHIN AKTAR HOSSAIN", gender: "Male", mobile: "9733131420", designation: "PS Member", sansad: "Bhagabanpur-2", village: "RAMDEBPUR" },
            { name: "RUPSANA BEGAM", gender: "Female", mobile: "7872857624", designation: "PS Member", sansad: "Bhagabanpur-3", village: "PANBARA" }
        ];

        // এলিমেন্ট রেফারেন্স
        const issueDate = document.getElementById('issueDate');
        const meetingDate = document.getElementById('meetingDate');
        const meetingTime = document.getElementById('meetingTime');
        const dayText = document.getElementById('dayText');
        const meetingType = document.getElementById('meetingType');
        const checkboxContainer = document.getElementById('checkboxContainer');
        const selectedOrderedList = document.getElementById('selectedOrderedList');
        const agendaRowsDiv = document.getElementById('agendaRows');
        
        // বাটন
        const generateBtn = document.getElementById('generateBtn');
        const exportPdfBtn = document.getElementById('exportPdfBtn');
        const exportDocBtn = document.getElementById('exportDocBtn');
        const saveSheetBtn = document.getElementById('saveSheetBtn');
        const viewPrevBtn = document.getElementById('viewPrevBtn');
        const closePrevBtn = document.getElementById('closePrevBtn');
        const updateBtn = document.getElementById('updateBtn');
        const closeEditBtn = document.getElementById('closeEditBtn');
        const defaultButtons = document.getElementById('defaultButtons');
        const editModeButtons = document.getElementById('editModeButtons');
        
        const printPreview = document.getElementById('printPreview');
        const prevPanel = document.getElementById('previousMeetingsPanel');
        const prevTableBody = document.getElementById('prevTableBody');

        let currentEditIndex = null;
        let savedMeetings = JSON.parse(localStorage.getItem('meetingRecords')) || [];

        // ---------- শুধু নাম দেখাবে (ক্লিন ইনপুট) ----------
        function renderCheckboxes() {
            let html = '';
            fullMemberDatabase.forEach(member => {
                const id = `chk_${member.name.replace(/\s/g,'_')}`;
                html += `<div class="member-row">
                    <input type="checkbox" value="${member.name}" id="${id}" class="memberCheck">
                    <label for="${id}">${member.name}</label>
                </div>`;
            });
            checkboxContainer.innerHTML = html;
        }
        renderCheckboxes();

        // নির্বাচিত সদস্যের তালিকা
        function updateSelectedList() {
            const checks = Array.from(document.querySelectorAll('.memberCheck:checked'));
            if (!checks.length) {
                selectedOrderedList.innerHTML = '<span>— কাউকে নয়</span>';
                return;
            }
            let html = '';
            checks.forEach((cb, idx) => { 
                html += `<span>${idx+1}. ${cb.value}</span>`; 
            });
            selectedOrderedList.innerHTML = html;
        }

        // দিন স্বয়ংক্রিয়
        function updateDayFromDate() {
            const dateVal = meetingDate.value;
            if (!dateVal) { dayText.value = ''; return; }
            const parts = dateVal.split('-');
            const d = new Date(parts[0], parts[1]-1, parts[2]);
            if (isNaN(d)) return;
            const weekdays = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
            dayText.value = weekdays[d.getDay()];
        }
        meetingDate.addEventListener('change', updateDayFromDate);
        updateDayFromDate();

        // এজেন্ডা
        function createAgendaRow(value = '') {
            const row = document.createElement('div');
            row.className = 'ag-row';
            const num = document.createElement('span');
            num.className = 'num';
            row.appendChild(num);
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.placeholder = 'আলোচ্য বিষয়';
            inp.value = value;
            inp.addEventListener('input', function() { handleAgendaInput(row); });
            row.appendChild(inp);
            return row;
        }
        
        function renumberAgenda() {
            const rows = Array.from(agendaRowsDiv.querySelectorAll('.ag-row'));
            rows.forEach((r, i) => { const s = r.querySelector('.num'); if (s) s.textContent = i + 1; });
        }
        
        function handleAgendaInput(currentRow) {
            const rows = Array.from(agendaRowsDiv.querySelectorAll('.ag-row'));
            const lastRow = rows[rows.length - 1];
            const lastInp = lastRow.querySelector('input');
            if (currentRow === lastRow && lastInp.value.trim() !== '') {
                agendaRowsDiv.appendChild(createAgendaRow(''));
            }
            renumberAgenda();
        }
        
        function initAgenda() {
            agendaRowsDiv.innerHTML = '';
            agendaRowsDiv.appendChild(createAgendaRow('বার্ষিক বাজেট আলোচনা'));
            agendaRowsDiv.appendChild(createAgendaRow('পানীয় জল সরবরাহ'));
            agendaRowsDiv.appendChild(createAgendaRow(''));
            renumberAgenda();
        }
        initAgenda();

        function getAgendaItems() {
            return Array.from(agendaRowsDiv.querySelectorAll('.ag-row input')).map(i => i.value.trim()).filter(v => v);
        }

        // সদস্য তথ্য পাওয়া (শুধু লেটারের জন্য)
        function getMemberDetails(memberName) {
            return fullMemberDatabase.find(m => m.name === memberName) || {
                mobile: '০১৭xxxxxxxx',
                designation: 'সদস্য',
                sansad: '৫ নং',
                village: 'গ্রাম'
            };
        }

        // চেকবক্স সেট
        function setCheckedMembersFromString(recipientStr) {
            const names = recipientStr.split(',').map(s => s.trim());
            document.querySelectorAll('.memberCheck').forEach(cb => {
                cb.checked = names.includes(cb.value);
            });
            updateSelectedList();
        }

        // এজেন্ডা সেট
        function setAgendaFromString(agendaStr) {
            const items = agendaStr.split(',').map(s => s.trim()).filter(s => s);
            agendaRowsDiv.innerHTML = '';
            items.forEach(item => agendaRowsDiv.appendChild(createAgendaRow(item)));
            agendaRowsDiv.appendChild(createAgendaRow(''));
            renumberAgenda();
        }

        // এজেন্ডা ফরম্যাট
        function formatAgendaWithIcons() {
            const items = getAgendaItems();
            if (!items.length) return '<div class="agenda-item"><span class="agenda-icon">•</span> কোনো এজেন্ডা নেই</div>';
            return items.map((item, idx) => 
                `<div class="agenda-item"><span class="agenda-icon">${idx+1}</span> ${item}</div>`
            ).join('');
        }

        // তারিখ ফরম্যাট
        function formatDateBangla(ds) {
            if (!ds) return '____';
            const p = ds.split('-');
            const d = new Date(p[0], p[1]-1, p[2]);
            if (isNaN(d)) return ds;
            try { return d.toLocaleDateString('bn-BD', {day:'numeric', month:'long', year:'numeric'}); }
            catch { return d.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'}); }
        }

        // লেটার জেনারেট (সম্পূর্ণ তথ্য সহ)
        function generateLetterPair(memberName) {
            const member = getMemberDetails(memberName);
            const typeVal = meetingType.value;
            const mDate = formatDateBangla(meetingDate.value);
            const day = dayText.value.trim() || '____';
            const time = meetingTime.value.trim() || '____';
            const iDate = formatDateBangla(issueDate.value);
            const agendaHTML = formatAgendaWithIcons();

            function copy(label) {
                return `<div class="copy-badge">${label}</div>
                    <div class="format-letter">
                        <div class="center bold">ফর্ম নং-১</div>
                        <div class="center">৫ নিয়ম দ্রষ্টব্য</div>
                        <div class="center bold">গ্রাম পঞ্চায়েতের ${typeVal} সভার নোটিশ</div>
                        <div class="dotted-line"></div>
                        <div>
                            <span class="bold">প্রতি,</span><br>
                            <span class="bold">${member.name}</span><br>
                            পদ- ${member.designation}<br>
                            সংসদ- ${member.sansad}<br>
                            গ্রাম- ${member.village}<br>
                            ☎ মোবাইল- ${member.mobile}
                        </div>
                        <p>মহাশয় /মহাশয়া,</p>
                        <p>এত দ্বারা আপনাকে জানানো যাইতেছে যে নিম্ন লিখিত বিষয়গুলি আলোচনা ও সিদ্ধান্ত গ্রহণের নিমিত্তে ভগবানপুর গ্রাম পঞ্চায়েতে একটি সভার আয়োজন করা হয়েছে ।</p>
                        <p><span class="bold">সভার ধরন-</span> ${typeVal}<br>
                           <span class="bold">সভার তাং-</span> ${mDate}, ${day}<br>
                           <span class="bold">সময়-</span> ${time}</p>
                        <p>অতএব উক্ত দিবসে নির্ধারিত সময়ে নিম্ন লিখিত বিষয় গুলির আলোচনায় যোগদান করার জন্য আপনাকে একান্ত ভাবে অনুরোধ করিতেছে।</p>
                        <p><span class="bold">আলোচ্য বিষয়-</span></p>
                        ${agendaHTML}
                        <div class="signature-line">
                            <span>তারিখ- ${iDate}</span>
                            <span>সচিব<br>ভগবানপুর গ্রাম পঞ্চায়েত</span>
                        </div>
                    </div>`;
            }
            
            return `<div class="double-letter">
                <div class="letter-half">${copy('🏢 অফিস কপি')}</div>
                <div class="vertical-dotted"></div>
                <div class="letter-half">${copy('📨 প্রাপক কপি')}</div>
            </div>`;
        }

        // প্রিভিউ রেন্ডার
        function renderPrintPreview() {
            const checks = Array.from(document.querySelectorAll('.memberCheck:checked'));
            if (!checks.length) {
                printPreview.innerHTML = '<div style="background:#f8e8dd; padding:20px;">⚠️ সদস্য নির্বাচন করুন</div>';
                return;
            }
            let pages = '';
            checks.forEach((cb) => { 
                pages += `<div class="member-page">${generateLetterPair(cb.value)}</div>`; 
            });
            printPreview.innerHTML = pages;
        }

        // সেভ ফাংশন
        function saveToLocalStorage(editIndex = null) {
            const checks = Array.from(document.querySelectorAll('.memberCheck:checked'));
            if (!checks.length) { alert('সদস্য নির্বাচন করুন'); return; }
            
            const recipients = checks.map(cb => cb.value).join(', ');
            const agendaList = getAgendaItems().join(', ');
            
            const newRecord = {
                slNo: editIndex !== null ? editIndex + 1 : savedMeetings.length + 1,
                dateOfMeeting: meetingDate.value,
                meetingTime: meetingTime.value,
                letterIssueDate: issueDate.value,
                meetingType: meetingType.value,
                agenda: agendaList,
                recipient: recipients
            };
            
            if (editIndex !== null) {
                savedMeetings[editIndex] = newRecord;
            } else {
                savedMeetings.push(newRecord);
            }
            
            savedMeetings.forEach((rec, idx) => rec.slNo = idx + 1);
            localStorage.setItem('meetingRecords', JSON.stringify(savedMeetings));
            alert('সভার তথ্য সেভ করা হয়েছে');
            exitEditMode();
        }

        function exitEditMode() {
            currentEditIndex = null;
            defaultButtons.style.display = 'flex';
            editModeButtons.style.display = 'none';
        }

        // পূর্ববর্তী সভা দেখান
        function displayPreviousMeetings() {
            if (savedMeetings.length === 0) {
                prevTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">কোনো পূর্ববর্তী সভা নেই</td></tr>';
            } else {
                let rows = '';
                savedMeetings.forEach((rec, idx) => {
                    rows += `<tr>
                        <td>${idx+1}</td>
                        <td>${rec.dateOfMeeting}</td>
                        <td>${rec.meetingTime}</td>
                        <td>${rec.letterIssueDate}</td>
                        <td>${rec.meetingType}</td>
                        <td>${rec.agenda.substring(0, 30)}${rec.agenda.length > 30 ? '...' : ''}</td>
                        <td>${rec.recipient.substring(0, 20)}${rec.recipient.length > 20 ? '...' : ''}</td>
                        <td class="action-icons">
                            <i class="fas fa-eye" title="দেখুন" onclick="viewMeeting(${idx})"></i>
                            <i class="fas fa-edit" title="সম্পাদনা" onclick="editMeeting(${idx})"></i>
                            <i class="fas fa-trash-alt" title="মুছুন" onclick="deleteMeeting(${idx})"></i>
                        </td>
                    </tr>`;
                });
                prevTableBody.innerHTML = rows;
            }
            prevPanel.style.display = 'block';
            printPreview.style.display = 'none';
        }

        // গ্লোবাল ফাংশন
        window.viewMeeting = function(index) {
            const rec = savedMeetings[index];
            issueDate.value = rec.letterIssueDate;
            meetingDate.value = rec.dateOfMeeting;
            meetingTime.value = rec.meetingTime;
            meetingType.value = rec.meetingType;
            updateDayFromDate();
            setCheckedMembersFromString(rec.recipient);
            setAgendaFromString(rec.agenda);
            
            printPreview.style.display = 'flex';
            renderPrintPreview();
            prevPanel.style.display = 'none';
            exitEditMode();
        };

        window.editMeeting = function(index) {
            const rec = savedMeetings[index];
            issueDate.value = rec.letterIssueDate;
            meetingDate.value = rec.dateOfMeeting;
            meetingTime.value = rec.meetingTime;
            meetingType.value = rec.meetingType;
            updateDayFromDate();
            setCheckedMembersFromString(rec.recipient);
            setAgendaFromString(rec.agenda);
            
            currentEditIndex = index;
            defaultButtons.style.display = 'none';
            editModeButtons.style.display = 'flex';
            prevPanel.style.display = 'none';
            printPreview.style.display = 'flex';
            renderPrintPreview();
        };

        window.deleteMeeting = function(index) {
            if (confirm('নিশ্চিতভাবে মুছবেন?')) {
                savedMeetings.splice(index, 1);
                savedMeetings.forEach((rec, i) => rec.slNo = i + 1);
                localStorage.setItem('meetingRecords', JSON.stringify(savedMeetings));
                displayPreviousMeetings();
                exitEditMode();
            }
        };

        // ইভেন্ট লিসেনার
        document.querySelectorAll('.memberCheck').forEach(cb => {
            cb.addEventListener('change', updateSelectedList);
        });

        generateBtn.addEventListener('click', function() {
            printPreview.style.display = 'flex';
            prevPanel.style.display = 'none';
            updateSelectedList();
            renderPrintPreview();
            exitEditMode();
        });

        saveSheetBtn.addEventListener('click', function() {
            saveToLocalStorage();
        });

        viewPrevBtn.addEventListener('click', function() {
            displayPreviousMeetings();
            exitEditMode();
        });

        closePrevBtn.addEventListener('click', function() {
            prevPanel.style.display = 'none';
            printPreview.style.display = 'flex';
        });

        updateBtn.addEventListener('click', function() {
            if (currentEditIndex !== null) {
                saveToLocalStorage(currentEditIndex);
            } else {
                alert('কোনো এডিট সেশন নেই');
                exitEditMode();
            }
        });

        closeEditBtn.addEventListener('click', function() {
            exitEditMode();
            prevPanel.style.display = 'none';
            printPreview.style.display = 'flex';
        });

        // PDF ও DOC এক্সপোর্ট
        function getExportHTML() {
            const checks = Array.from(document.querySelectorAll('.memberCheck:checked'));
            if (!checks.length) return '<p>কোন সদস্য নির্বাচিত নয়</p>';
            let pages = '';
            checks.forEach((cb) => { 
                pages += `<div style="page-break-after: always;">${generateLetterPair(cb.value)}</div>`; 
            });
            return pages;
        }

        exportDocBtn.addEventListener('click', function() {
            const content = getExportHTML();
            if (!content || content.includes('কোন সদস্য')) { alert('সদস্য নির্বাচন করুন'); return; }
            const style = `<style>
                body{font-family:'Noto Sans Bengali','Times New Roman',serif;margin:0.5in;}
                .double-letter{display:flex;}
                .letter-half{flex:1;padding:10px;font-size:11pt;}
                .vertical-dotted{border-left:2px dotted #4a6f8f;margin:0 5px;}
                .copy-badge{background:#1b5385;color:white;padding:2px 12px;border-radius:20px;display:inline-block;}
                .dotted-line{border-top:1px dashed #000;margin:5px 0;}
                .signature-line{display:flex;justify-content:space-between;margin-top:15px;}
                .bold{font-weight:700;}
                .center{text-align:center;}
                .agenda-item{display:flex;align-items:center;gap:5px;margin:2px 0;}
                .agenda-icon{background:#275d91;color:white;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
            </style>`;
            const fullHtml = `<html><head><meta charset="UTF-8">${style}</head><body>${content}</body></html>`;
            const blob = new Blob([fullHtml], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `pancayat_notice_${new Date().toISOString().slice(0,10)}.doc`;
            link.click();
        });

        exportPdfBtn.addEventListener('click', function() {
            const checks = Array.from(document.querySelectorAll('.memberCheck:checked'));
            if (!checks.length) { alert('সদস্য নির্বাচন করুন'); return; }
            const printWindow = window.open('', '_blank', 'width=1100,height=700');
            if (!printWindow) { alert('পপ-আপ ব্লকার সক্রিয়'); return; }
            const content = getExportHTML();
            const style = `<style>
                body{font-family:'Noto Sans Bengali','Times New Roman',serif;margin:0.4in;}
                .double-letter{display:flex;}
                .letter-half{flex:1;padding:10px;font-size:11pt;}
                .vertical-dotted{border-left:2px dotted #4a6f8f;margin:0 5px;}
                .copy-badge{background:#1b5385;color:white;padding:2px 12px;border-radius:20px;display:inline-block;}
                .dotted-line{border-top:1px dashed #000;margin:5px 0;}
                .signature-line{display:flex;justify-content:space-between;margin-top:15px;}
                .bold{font-weight:700;}
                .center{text-align:center;}
                .agenda-item{display:flex;align-items:center;gap:5px;margin:2px 0;}
                .agenda-icon{background:#275d91;color:white;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
                @media print{@page{size:A4 landscape;margin:0.5in;}}
            </style>`;
            printWindow.document.write(`<html><head><meta charset="UTF-8">${style}</head><body>${content}</body></html>`);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => { printWindow.print(); }, 300);
        });

        // লোডে
        window.addEventListener('load', function() {
            const chks = document.querySelectorAll('.memberCheck');
            if (chks.length) {
                chks[0].checked = true;
                chks[1].checked = true;
                chks[2].checked = true;
            }
            updateSelectedList();
            renderPrintPreview();
        });
    })();
</script>
</body>
</html>
