<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিটিং ম্যানেজমেন্ট সিস্টেম</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #a5bed9;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 15px;
            font-family: 'Noto Sans Bengali', 'Segoe UI', 'Times New Roman', serif;
        }
        .app-wrapper {
            max-width: 1500px;
            width: 100%;
            background: #e2ecf7;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .system-title {
            background: #08355c;
            color: white;
            padding: 0.8rem 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            border-bottom: 3px solid #ffc107;
            text-align: center;
        }

        /* তিন কলাম ইনপুট */
        .three-col {
            display: flex;
            flex-wrap: wrap;
            background: #e9f2fc;
            border-bottom: 3px solid #9cb9d7;
        }
        .col {
            padding: 1rem 0.9rem;
            max-height: 350px;
            overflow-y: auto;
        }
        .col-left {
            flex: 2 1 250px;
            border-right: 2px dashed #8aa7cc;
        }
        .col-middle {
            flex: 2.2 1 280px;
            border-right: 2px dashed #8aa7cc;
            background: #deecfa;
        }
        .col-right {
            flex: 2 1 250px;
            background: #d7e6fb;
        }
        .col-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #08355c;
            margin-bottom: 0.7rem;
        }
        .col-title span {
            background: #1b5385;
            color: white;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            font-size: 0.6rem;
        }

        .field-sm {
            margin-bottom: 0.6rem;
        }
        .field-sm label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #123f67;
            display: block;
        }
        .field-sm input, .field-sm select {
            width: 100%;
            padding: 0.3rem 0.8rem;
            border: 1px solid #7f9fc7;
            border-radius: 30px;
            font-size: 0.65rem;
            background: white;
        }
        .inline-duo {
            display: flex;
            gap: 6px;
        }

        /* চেকবক্স */
        .checkbox-scroll {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #8daacd;
            border-radius: 16px;
            padding: 5px 6px;
            background: #f6faff;
            margin-bottom: 6px;
        }
        .member-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            padding: 3px 0;
            border-bottom: 1px dashed #c4d4ec;
        }
        .member-row input {
            width: 14px;
            height: 14px;
            accent-color: #1b5589;
        }
        .selected-list {
            background: #dde9f7;
            border-radius: 16px;
            padding: 6px 8px;
            border: 1px solid #5f8fc0;
        }
        .selected-list .mini-title {
            font-weight: 700;
            font-size: 0.65rem;
            color: #0c345a;
        }
        .selected-names {
            max-height: 70px;
            overflow-y: auto;
            font-size: 0.6rem;
        }
        .selected-names span {
            display: block;
            border-bottom: 1px dashed #acc6e3;
            padding: 2px 0;
        }

        /* এজেন্ডা ডায়নামিক */
        .agenda-rows {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin: 8px 0;
        }
        .ag-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .ag-row .num {
            background: #275d91;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .ag-row input {
            flex: 1;
            padding: 0.3rem 0.9rem;
            border: 1px solid #4e81b5;
            border-radius: 30px;
            font-size: 0.65rem;
            background: white;
        }
        .ag-note {
            font-size: 0.55rem;
            color: #1d4875;
        }

        /* বাটন গ্রুপ */
        .button-row {
            background: #e9f2fc;
            padding: 0.7rem 2rem 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .gen-btn, .pdf-btn, .doc-btn, .save-btn, .view-btn, .update-btn, .close-btn {
            border: none;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 10px #0f3552;
            cursor: pointer;
            border: 1px solid #598ac2;
        }
        .gen-btn { background: #114977; }
        .pdf-btn { background: #a03535; }
        .doc-btn { background: #2f6b2f; }
        .save-btn { background: #1f7a7a; }
        .view-btn { background: #9d6b1f; }
        .update-btn { background: #2a7a4d; }
        .close-btn { background: #7a3e3e; }

        /* প্রিন্ট প্রিভিউ */
        .print-area {
            background: #c8d9f0;
            padding: 20px 15px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            border-top: 3px solid #6f8db0;
        }
        .member-page {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 24px;
            padding: 18px 15px;
            box-shadow: 0 8px 20px rgba(0, 25, 45, 0.5);
            page-break-after: always;
        }
        .double-letter {
            display: flex;
        }
        .letter-half {
            flex: 1 1 45%;
            padding: 0.7rem;
            font-size: 0.6rem;
            line-height: 1.4;
        }
        .vertical-dotted {
            flex: 0 0 2px;
            border-left: 2px dotted #4a6f8f;
            margin: 5px 0;
        }
        .format-letter {
            white-space: pre-line;
        }
        .center { text-align: center; }
        .bold { font-weight: 700; }
        .dotted-line { border-top: 1px dashed #2a2a2a; margin: 4px 0; }
        .signature-line { display: flex; justify-content: space-between; margin-top: 10px; }
        .copy-badge {
            background: #1b5385; color: white; padding: 0.1rem 0.9rem; border-radius: 20px;
            font-size: 0.45rem; display: inline-block; margin-bottom: 3px;
        }
        .agenda-item {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 2px 0;
        }
        .agenda-icon {
            font-size: 0.7rem;
            background: #275d91;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* পূর্ববর্তী সভা টেবিল */
        .previous-meetings {
            background: white;
            margin: 15px 20px;
            border-radius: 20px;
            padding: 15px;
            box-shadow: inset 0 2px 8px #b0c7df;
            max-height: 400px;
            overflow: auto;
            border: 2px solid #1b5385;
        }
        .prev-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .close-prev-btn {
            background: #a03535;
            color: white;
            border: none;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        th {
            background: #1b5385;
            color: white;
            padding: 8px;
            position: sticky;
            top: 0;
        }
        td {
            border: 1px solid #acc6e3;
            padding: 6px;
        }
        .action-icons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .action-icons i {
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .fa-eye { color: #1f7a7a; }
        .fa-edit { color: #b36b1e; }
        .fa-trash-alt { color: #b33b3b; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #08355c;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="system-title">
        📋 মিটিং ম্যানেজমেন্ট সিস্টেম
    </div>

    <!-- তিন কলাম ইনপুট -->
    <div class="three-col">
        <div class="col col-left">
            <div class="col-title"><span>📅</span> সভার বিবরণ</div>
            <div class="field-sm"><label>📆 পত্র ইস্যুর তারিখ</label><input type="date" id="issueDate" value="2026-09-01"></div>
            <div class="field-sm"><label>📅 সভার তারিখ</label><input type="date" id="meetingDate" value="2026-09-10"></div>
            <div class="field-sm"><label>⏰ সভার সময়</label><input type="text" id="meetingTime" value="বিকাল ৪:০০"></div>
            <div class="field-sm"><label>📌 দিন</label><input type="text" id="dayText" readonly></div>
            <div class="field-sm"><label>🧩 সভার ধরন</label>
                <select id="meetingType">
                    <option value="সাধারণ">সাধারণ</option>
                    <option value="কৃষি ও প্রানি সম্পদ বিকাশ" selected>কৃষি ও প্রানি</option>
                    <option value="শিল্প ও পরিকাঠামো উপসমিতি">শিল্প ও পরিকাঠামো</option>
                    <option value="জরুরি সাধারণ">জরুরি সাধারণ</option>
                    <option value="অর্থ ও পরিকল্পনা উপসমিতি">অর্থ ও পরিকল্পনা</option>
                    <option value="নারী শিশু উন্নয়ন ও সমাজ কল্যাণ উপসমিতি">নারী শিশু</option>
                    <option value="শিক্ষা ও জন স্বাস্থ্য উপসমিতি">শিক্ষা ও স্বাস্থ্য</option>
                </select>
            </div>
        </div>

        <div class="col col-middle">
            <div class="col-title"><span>✅</span> সদস্য নির্বাচন</div>
            <div class="checkbox-scroll" id="checkboxContainer"></div>
            <div class="selected-list">
                <div class="mini-title">নির্বাচিত সদস্য</div>
                <div class="selected-names" id="selectedOrderedList">—</div>
            </div>
        </div>

        <div class="col col-right">
            <div class="col-title"><span>📋</span> এজেন্ডা</div>
            <div class="agenda-rows" id="agendaRows"></div>
            <div class="ag-note">★ শেষ ঘরে লিখলে নতুন সারি যোগ হয়</div>
        </div>
    </div>

    <!-- বাটন গ্রুপ -->
    <div class="button-row" id="defaultButtons">
        <button class="gen-btn" id="generateBtn">🖨️ জেনারেট</button>
        <button class="save-btn" id="saveBtn">💾 সেভ</button>
        <button class="view-btn" id="viewBtn">📋 পূর্ববর্তী সভা দেখুন</button>
        <button class="pdf-btn" id="pdfBtn">📕 PDF</button>
        <button class="doc-btn" id="docBtn">📄 DOC</button>
    </div>

    <!-- এডিট মোড বাটন -->
    <div class="button-row" id="editModeButtons" style="display: none;">
        <button class="update-btn" id="updateBtn">🔄 আপডেট</button>
        <button class="close-btn" id="closeEditBtn">✖️ বন্ধ করুন</button>
    </div>

    <!-- লোডার -->
    <div id="loader" style="display: none; text-align: center;"><div class="loader"></div></div>

    <!-- পূর্ববর্তী সভা টেবিল -->
    <div id="previousMeetingsPanel" class="previous-meetings" style="display: none;">
        <div class="prev-header">
            <h3>📋 পূর্ববর্তী সভার তালিকা</h3>
            <button class="close-prev-btn" id="closePrevBtn">বন্ধ করুন</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="meetingsTable">
                <thead>
                    <tr>
                        <th>SL NO</th>
                        <th>DATE OF MEETING</th>
                        <th>MEETING TIME</th>
                        <th>LETTER ISSUE DATE</th>
                        <th>MEETING TYPE</th>
                        <th>AGENDA</th>
                        <th>RECIPIENT</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="meetingsTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- প্রিন্ট প্রিভিউ -->
    <div class="print-area" id="printPreview"></div>
</div>

<script>
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyHnBPqLfoFxrtUzpkZK8xtLsHB2G_kcAm3ijuWhYQG2hPOS7db1w0j2CXzS5KnucEdBg/exec'; // আপনার URL বসান
    
    // মেম্বার লিস্ট
    const memberList = [
        "FENSHI KHATUN","REJAUL KARIM","NARGIS KHATUN","KESHOMATI BARMAN","ALO MAHALDAR",
        "TAJMIRA YEASMIN","ANTARA KHATUN","ABU BAKKAR SIDDIQUE","NASIMA BANU","MD SHARIF ALI",
        "HUSNARA KHATUN","MD AL AMIN","FERDOSHI BEGAM","INJILA","GOLAP ALI","BENEJI KHATUN",
        "MD ATAUR RAHAMAN","KAUSARA BEGAM","AFAJUDDIN AHAMED","ZED RAHAMAN","MOUSUMI KHATUN","SYED NEAMUL HOQUE"
    ];

    let currentEditId = null;
    let meetingsData = [];

    // চেকবক্স রেন্ডার
    function renderCheckboxes() {
        let html = '';
        memberList.forEach(name => {
            html += `<div class="member-row">
                <input type="checkbox" value="${name}" class="memberCheck">
                <label>${name}</label>
            </div>`;
        });
        document.getElementById('checkboxContainer').innerHTML = html;
    }
    renderCheckboxes();

    // দিন আপডেট
    function updateDay() {
        const date = document.getElementById('meetingDate').value;
        if (date) {
            const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
            const d = new Date(date);
            document.getElementById('dayText').value = days[d.getDay()];
        }
    }
    document.getElementById('meetingDate').addEventListener('change', updateDay);
    updateDay();

    // এজেন্ডা রো
    function createAgendaRow(value = '') {
        const row = document.createElement('div');
        row.className = 'ag-row';
        row.innerHTML = `<span class="num"></span><input type="text" placeholder="আলোচ্য বিষয়" value="${value}">`;
        row.querySelector('input').addEventListener('input', function() {
            const rows = document.querySelectorAll('.ag-row');
            const lastRow = rows[rows.length - 1];
            if (this.value && lastRow.querySelector('input').value && lastRow === row) {
                document.getElementById('agendaRows').appendChild(createAgendaRow(''));
            }
            renumberAgenda();
        });
        return row;
    }

    function renumberAgenda() {
        document.querySelectorAll('.ag-row .num').forEach((el, i) => el.textContent = i + 1);
    }

    // এজেন্ডা ইনিশিয়ালাইজ
    const agendaRows = document.getElementById('agendaRows');
    agendaRows.appendChild(createAgendaRow('বার্ষিক বাজেট আলোচনা'));
    agendaRows.appendChild(createAgendaRow('পানীয় জল সরবরাহ'));
    agendaRows.appendChild(createAgendaRow(''));
    renumberAgenda();

    function getAgendaItems() {
        return Array.from(document.querySelectorAll('.ag-row input'))
            .map(i => i.value.trim()).filter(v => v);
    }

    // প্রিন্ট প্রিভিউ
    function generateLetterPair(memberName) {
        const type = document.getElementById('meetingType').value;
        const date = document.getElementById('meetingDate').value;
        const time = document.getElementById('meetingTime').value;
        const day = document.getElementById('dayText').value;
        const issueDate = document.getElementById('issueDate').value;
        const agenda = getAgendaItems().map((item, i) => 
            `<div class="agenda-item"><span class="agenda-icon">${i+1}</span> ${item}</div>`
        ).join('');

        return `<div class="double-letter">
            <div class="letter-half">${generateCopy('অফিস কপি', memberName, type, date, time, day, issueDate, agenda)}</div>
            <div class="vertical-dotted"></div>
            <div class="letter-half">${generateCopy('প্রাপক কপি', memberName, type, date, time, day, issueDate, agenda)}</div>
        </div>`;
    }

    function generateCopy(label, name, type, date, time, day, issueDate, agenda) {
        return `<div class="copy-badge">${label}</div>
            <div class="format-letter">
                <div class="center bold">ফর্ম নং-১</div>
                <div class="center">৫ নিয়ম দ্রষ্টব্য</div>
                <div class="center bold">গ্রাম পঞ্চায়েতের ${type} সভার নোটিশ</div>
                <div class="dotted-line"></div>
                <div>প্রতি,<br>নাম- ${name},<br>পদ- সদস্য<br>সংসদ- ৫ নং<br>গ্রাম- উত্তরপাড়া<br>☎ মোবাইল নং- ০১৭xxxx</div>
                <p>মহাশয় /মহাশয়া,</p>
                <p>এত দ্বারা আপনাকে জানানো যাইতেছে যে নিম্ন লিখিত বিষয়গুলি আলোচনা ও সিদ্ধান্ত গ্রহণের নিমিত্তে সুলতান নগর গ্রাম পঞ্চায়েতে একটি সভার আয়োজন করা হয়েছে ।</p>
                <p>সভার ধরন- ${type}<br>সভার তাং- ${date}, ${day}<br>সময়- ${time}</p>
                <p>আলোচ্য বিষয়-</p>${agenda}
                <div class="signature-line"><span>তারিখ- ${iDate}</span><span>সচিব<br>সুলতান নগর গ্রাম পঞ্চায়েত</span></div>
            </div>`;
    }

    // API কল
    async function apiCall(action, data = {}) {
        const params = new URLSearchParams({ action, ...data });
        const response = await fetch(`${SHEET_URL}?${params}`);
        return await response.json();
    }

    // সেভ
    document.getElementById('saveBtn').onclick = async () => {
        const recipients = Array.from(document.querySelectorAll('.memberCheck:checked')).map(cb => cb.value).join(', ');
        if (!recipients) return alert('সদস্য নির্বাচন করুন');

        const data = {
            dateOfMeeting: document.getElementById('meetingDate').value,
            meetingTime: document.getElementById('meetingTime').value,
            letterIssueDate: document.getElementById('issueDate').value,
            meetingType: document.getElementById('meetingType').value,
            agenda: getAgendaItems().join(', '),
            recipient: recipients
        };

        document.getElementById('loader').style.display = 'block';
        const result = await apiCall('save', data);
        document.getElementById('loader').style.display = 'none';
        
        if (result.status === 'success') {
            alert('সফলভাবে সংরক্ষিত');
        } else {
            alert('ত্রুটি: ' + result.message);
        }
    };

    // পূর্ববর্তী সভা দেখুন
    document.getElementById('viewBtn').onclick = async () => {
        document.getElementById('loader').style.display = 'block';
        const result = await apiCall('get');
        document.getElementById('loader').style.display = 'none';
        
        if (result.status === 'success') {
            meetingsData = result.data;
            const tbody = document.getElementById('meetingsTableBody');
            tbody.innerHTML = '';
            
            meetingsData.forEach((row, i) => {
                tbody.innerHTML += `<tr>
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td>${row[4]}</td>
                    <td>${row[5]}</td>
                    <td>${row[6]}</td>
                    <td class="action-icons">
                        <i class="fas fa-eye" onclick="viewMeeting(${i})"></i>
                        <i class="fas fa-edit" onclick="editMeeting(${i})"></i>
                        <i class="fas fa-trash-alt" onclick="deleteMeeting(${row[0]})"></i>
                    </td>
                </tr>`;
            });
            
            document.getElementById('previousMeetingsPanel').style.display = 'block';
            document.getElementById('printPreview').style.display = 'none';
        }
    };

    // ভিউ
    window.viewMeeting = (index) => {
        const row = meetingsData[index];
        document.getElementById('issueDate').value = row[3];
        document.getElementById('meetingDate').value = row[1];
        document.getElementById('meetingTime').value = row[2];
        document.getElementById('meetingType').value = row[4];
        updateDay();
        
        // সদস্য সেট
        document.querySelectorAll('.memberCheck').forEach(cb => {
            cb.checked = row[6].split(',').map(s => s.trim()).includes(cb.value);
        });
        
        // এজেন্ডা সেট
        const agenda = row[5].split(',').map(s => s.trim());
        document.getElementById('agendaRows').innerHTML = '';
        agenda.forEach(item => document.getElementById('agendaRows').appendChild(createAgendaRow(item)));
        document.getElementById('agendaRows').appendChild(createAgendaRow(''));
        renumberAgenda();
        
        document.getElementById('previousMeetingsPanel').style.display = 'none';
        document.getElementById('printPreview').style.display = 'block';
        document.getElementById('printPreview').innerHTML = Array.from(document.querySelectorAll('.memberCheck:checked'))
            .map(cb => `<div class="member-page">${generateLetterPair(cb.value)}</div>`).join('');
    };

    // এডিট
    window.editMeeting = (index) => {
        viewMeeting(index);
        currentEditId = meetingsData[index][0];
        document.getElementById('defaultButtons').style.display = 'none';
        document.getElementById('editModeButtons').style.display = 'flex';
    };

    // ডিলিট
    window.deleteMeeting = async (id) => {
        if (!confirm('মুছবেন?')) return;
        document.getElementById('loader').style.display = 'block';
        const result = await apiCall('delete', { rowIndex: id });
        document.getElementById('loader').style.display = 'none';
        if (result.status === 'success') {
            alert('মুছে ফেলা হয়েছে');
            document.getElementById('viewBtn').click();
        }
    };

    // আপডেট
    document.getElementById('updateBtn').onclick = async () => {
        const recipients = Array.from(document.querySelectorAll('.memberCheck:checked')).map(cb => cb.value).join(', ');
        if (!recipients) return alert('সদস্য নির্বাচন করুন');

        const data = {
            rowIndex: currentEditId,
            dateOfMeeting: document.getElementById('meetingDate').value,
            meetingTime: document.getElementById('meetingTime').value,
            letterIssueDate: document.getElementById('issueDate').value,
            meetingType: document.getElementById('meetingType').value,
            agenda: getAgendaItems().join(', '),
            recipient: recipients
        };

        document.getElementById('loader').style.display = 'block';
        const result = await apiCall('save', data);
        document.getElementById('loader').style.display = 'none';
        
        if (result.status === 'success') {
            alert('আপডেট করা হয়েছে');
            document.getElementById('editModeButtons').style.display = 'none';
            document.getElementById('defaultButtons').style.display = 'flex';
            document.getElementById('viewBtn').click();
        }
    };

    // ক্লোজ বাটন
    document.getElementById('closePrevBtn').onclick = () => {
        document.getElementById('previousMeetingsPanel').style.display = 'none';
        document.getElementById('printPreview').style.display = 'block';
    };

    document.getElementById('closeEditBtn').onclick = () => {
        document.getElementById('editModeButtons').style.display = 'none';
        document.getElementById('defaultButtons').style.display = 'flex';
    };

    // জেনারেট
    document.getElementById('generateBtn').onclick = () => {
        const checks = document.querySelectorAll('.memberCheck:checked');
        if (!checks.length) return alert('সদস্য নির্বাচন করুন');
        
        document.getElementById('printPreview').innerHTML = Array.from(checks)
            .map(cb => `<div class="member-page">${generateLetterPair(cb.value)}</div>`).join('');
        document.getElementById('printPreview').style.display = 'block';
        document.getElementById('previousMeetingsPanel').style.display = 'none';
    };

    // PDF
    document.getElementById('pdfBtn').onclick = () => {
        const content = document.getElementById('printPreview').innerHTML;
        if (!content) return alert('প্রথমে জেনারেট করুন');
        
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>body{font-family:Noto Sans Bengali;margin:0.5in;}</style></head><body>${content}</body></html>`);
        win.document.close();
        win.print();
    };

    // DOC
    document.getElementById('docBtn').onclick = () => {
        const content = document.getElementById('printPreview').innerHTML;
        if (!content) return alert('প্রথমে জেনারেট করুন');
        
        const blob = new Blob([`<html><body>${content}</body></html>`], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'meeting_notice.doc';
        a.click();
    };
</script>
</body>
</html>
